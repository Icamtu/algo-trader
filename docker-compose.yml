services:
  # --- INFRASTRUCTURE ---
  redis:
    image: redis:6.2-alpine
    container_name: openalgo_redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256MB
    security_opt:
      - no-new-privileges:true

  mongodb:
    image: mongo:6.0.8
    container_name: mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MONGO_PORT}:27017"
    volumes:
      - ./mongodb_data:/data/db
    networks:
      - trading_net
    mem_limit: 512MB
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      - ENABLE_CORS=true
      - CONNECTION_TIMEOUT=60000
    networks:
      - trading_net
    mem_limit: 2GB
    cpu_shares: 1024
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- TRADING PLATFORM ---

  # --- TRADING ENGINE ---
  algo-trader:
    build:
      context: ./algo-trader
      dockerfile: Dockerfile
    container_name: algo_engine
    restart: always
    ports:
      - "127.0.0.1:18788:18788"
      - "${TAILSCALE_IP}:18788:18788"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./algo-trader:/app
      - ./database/db:/app/storage
      - ./openalgo-upstream:/app/openalgo-upstream:ro
    environment:
      - PORT=18788
      - TRADES_DB_PATH=/app/storage/trades.db
      - HISTORIFY_DB_PATH=/app/storage/historify.duckdb
      - TS_DB_HOST=timescaledb
      - TS_DB_PORT=5432
      - TS_DB_USER=postgres
      - TS_DB_NAME=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - RISK_MAX_DAILY_LOSS=${RISK_MAX_DAILY_LOSS:-50000}
      - RISK_MAX_DAILY_TRADES=${RISK_MAX_DAILY_TRADES:-200}
      - TAILSCALE_AUTH_KEY=${TAILSCALE_AUTH_KEY}
      - SIMULATION_ENABLED=${SIMULATION_ENABLED:-false}
      - DEBUG_AUTH=${DEBUG_AUTH:-false}
      # AetherBridge native broker wiring
      - AETHERBRIDGE_ACTIVE_BROKER=${AETHERBRIDGE_ACTIVE_BROKER:-paper}
      - AETHERBRIDGE_SHADOW_MODE=${AETHERBRIDGE_SHADOW_MODE:-false}
      - AETHERBRIDGE_BROKERS_SHOONYA_USER_ID=${SHOONYA_USER_ID}
      - AETHERBRIDGE_BROKERS_SHOONYA_PASSWORD=${SHOONYA_PASSWORD}
      - AETHERBRIDGE_BROKERS_SHOONYA_TOTP_SECRET=${SHOONYA_TOTP_SECRET}
      - AETHERBRIDGE_BROKERS_SHOONYA_API_KEY=${SHOONYA_API_KEY}
      - AETHERBRIDGE_BROKERS_SHOONYA_VENDOR_CODE=${SHOONYA_VENDOR_CODE}
      - AETHERBRIDGE_BROKERS_ZERODHA_USER_ID=${ZERODHA_USER_ID}
      - AETHERBRIDGE_BROKERS_ZERODHA_API_KEY=${ZERODHA_API_KEY}
      - AETHERBRIDGE_BROKERS_ZERODHA_API_SECRET=${ZERODHA_API_SECRET}
      - AETHERBRIDGE_BROKERS_ZERODHA_ACCESS_TOKEN=${ZERODHA_ACCESS_TOKEN}
    networks:
      - trading_net
    mem_limit: 1.5GB
    cpu_shares: 1024
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18788/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- SUPABASE STACK (LOCAL) ---
  supabase-db:
    container_name: supabase-db
    image: supabase/postgres:15.1.1.78
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    env_file: ./supabase/.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:54322:5432"
    volumes:
      - ./supabase/volumes/db/data:/var/lib/postgresql/data
      - ./supabase/volumes/db/init:/docker-entrypoint-initdb.d
      - ./supabase/fix-auth-admin.sql:/docker-entrypoint-initdb.d/99-fix-auth-admin.sql:ro
    networks:
      trading_net:
        aliases:
          - db
    restart: always
    mem_limit: 2GB
    security_opt:
      - no-new-privileges:true

  supabase-auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.143.0
    depends_on:
      supabase-db:
        condition: service_healthy
    env_file: ./supabase/.env
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${SUPABASE_AUTH_ADMIN_PASSWORD}@supabase-db:5432/postgres
      GOTRUE_EXTERNAL_URL: http://${TAILSCALE_IP}:8000
      GOTRUE_SITE_URL: http://${TAILSCALE_IP}
      GOTRUE_URI_ALLOW_LIST: http://${TAILSCALE_IP}/*,http://${TAILSCALE_IP}:3001/*,http://${TAILSCALE_IP}:3000/*
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_HEALTH_CHECK_TIMEOUT: 300s
    networks:
      - trading_net
    restart: always
    mem_limit: 256MB
    security_opt:
      - no-new-privileges:true

  supabase-rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.0.2
    depends_on:
      supabase-db:
        condition: service_healthy
    env_file: ./supabase/.env
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "ps -A | grep [p]ostgrest"]
      interval: 15s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - trading_net
    restart: always
    mem_limit: 256MB
    security_opt:
      - no-new-privileges:true

  supabase-kong:
    container_name: supabase-kong
    image: kong:2.8.1-alpine
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_healthy
    volumes:
      - ./supabase/kong.yml.template:/var/lib/kong/kong.yml.template:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
    command:
      - sh
      - -c
      - |
        sed "s/\$${TAILSCALE_IP}/${TAILSCALE_IP}/g" /var/lib/kong/kong.yml.template > /tmp/kong.yml && \
        /docker-entrypoint.sh kong docker-start
    ports:
      - "127.0.0.1:8000:8000"
      - "${TAILSCALE_IP}:8000:8000"
      - "127.0.0.1:8443:8443"
    networks:
      - trading_net
    restart: always
    mem_limit: 768MB
    security_opt:
      - no-new-privileges:true

  supabase-studio:
    container_name: supabase-studio
    image: supabase/studio:latest
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
    depends_on:
      supabase-kong:
        condition: service_started
      supabase-meta:
        condition: service_started
    ports:
      - "54321:3000"
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /tmp
    networks:
      - trading_net
    restart: always
    mem_limit: 512MB
    security_opt:
      - no-new-privileges:true

  supabase-meta:
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.84.2
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
    networks:
      - trading_net
    restart: always
    mem_limit: 512MB
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true


  # --- INSTITUTIONAL DATA STORE ---
  timescaledb:
    image: timescale/timescaledb:2.26.3-pg15
    container_name: timescaledb
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./timescale_data:/var/lib/postgresql/data
      - ./algo-trader/database/init_timescale.sql:/docker-entrypoint-initdb.d/init_timescale.sql:ro
    networks:
      - trading_net
    mem_limit: 2GB
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- CUSTOM TRADING UI ---
  trading-ui:
    build:
      context: ./trading-ui
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=http://${TAILSCALE_IP}:8000
        - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
    container_name: trading-ui
    restart: always
    ports:
      - "127.0.0.1:80:80"
      - "${TAILSCALE_IP}:80:80"
      - "127.0.0.1:3001:3001"
      - "${TAILSCALE_IP}:3001:3001"
    environment:
      - VITE_SUPABASE_URL=http://${TAILSCALE_IP}:8000
      - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
      - VITE_API_HOST=${TAILSCALE_IP}
      - TAILSCALE_IP=${TAILSCALE_IP}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      supabase-kong:
        condition: service_started
    networks:
      - trading_net
    volumes:
      - ./trading-ui/dist:/usr/share/nginx/html:ro
      - ./trading-ui/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    mem_limit: 128MB
    security_opt:
      - no-new-privileges:true

  ui-builder:
    image: oven/bun:latest
    container_name: ui-builder
    user: "0:0"
    working_dir: /app
    env_file: .env
    environment:
      - VITE_SUPABASE_URL=http://${TAILSCALE_IP}:8000
      - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
      - VITE_API_HOST=${TAILSCALE_IP}
      - TAILSCALE_IP=${TAILSCALE_IP}
    volumes:
      - ./trading-ui:/app
    command: ["sh", "-c", "bun install && bun x vite build && bun x vite build --watch"]
    networks:
      - trading_net
    restart: always
    mem_limit: 4GB
    security_opt:
      - no-new-privileges:true

  # --- LOCAL AI ENGINE ---
  ollama_engine:
    image: ollama/ollama:0.1.32
    container_name: local_ollama
    restart: always
    env_file: .env
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: ["serve"]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_NUM_PARALLEL=1
    networks:
      - trading_net
    mem_limit: 10GB
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- ANALYTICS & REPORTING ---
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    depends_on:
      ollama_engine:
        condition: service_healthy
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_LLM_TIMEOUT=600000
      - TZ=Asia/Kolkata
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENCLAW_GATEWAY_CONTROL_UI_DANGEROUSLY_DISABLE_SECURE_CONTEXT_CHECK=true
      - DB_PATH=/app/db/trades.db
      - OLLAMA_BASE_URL=http://local_ollama:11434
      - LOCAL_LLM_MODEL=qwen3.5-claude:latest
      - OPENCLAW_AI_MODEL=ollama/qwen3.5-claude:latest
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - TELEGRAM_DELETE_WEBHOOK_ON_START=false
      - OPENCLAW_GATEWAY_TRUST_REQUESTS=true
    mem_limit: 1.5GB
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./database/db:/app/db:ro
      - openalgo_log:/app/log:ro
      - openalgo_strategies:/app/strategies:ro
      - ./openclaw:/home/node/.openclaw:rw
    networks:
      - trading_net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- OBSERVABILITY STACK ---
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    restart: always
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
      - "${TAILSCALE_IP}:9090:9090"
    networks:
      - trading_net
    mem_limit: 512MB
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: always
    ports:
      - "127.0.0.1:3002:3000"
      - "${TAILSCALE_IP}:3002:3000"
    volumes:
      - ./observability/grafana/data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - trading_net
    mem_limit: 512MB
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true

  loki:
    image: grafana/loki:2.8.2
    container_name: loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/data:/loki
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - trading_net
    security_opt:
      - no-new-privileges:true

  promtail:
    image: grafana/promtail:2.8.2
    container_name: promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/loki/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - trading_net
    security_opt:
      - no-new-privileges:true

  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: jaeger
    restart: always
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - trading_net
    security_opt:
      - no-new-privileges:true

networks:
  trading_net:
    name: trading_net
    driver: bridge

volumes:
  openalgo_log:
  openalgo_strategies:
  openalgo_keys:
  ollama_data:
