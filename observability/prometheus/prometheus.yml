global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'algo_engine'
    static_configs:
      - targets: ['algo_engine:18788']
    metrics_path: '/metrics'

  - job_name: 'trading_ui'
    static_configs:
      - targets: ['trading-ui:80']

  - job_name: 'redis'
    static_configs:
      - targets: ['openalgo_redis:9121']
    metrics_path: '/metrics'

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescaledb:9187']
    metrics_path: '/metrics'

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: '/metrics'
