_format_version: "1.1"
_transform: true

services:
  - name: auth
    url: http://supabase-auth:8081
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: true

  - name: rest
    url: http://supabase-rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true

  - name: functions
    url: http://supabase-functions:9999
    routes:
      - name: functions-route
        paths:
          - /functions/v1
        strip_path: true

  - name: realtime
    url: http://supabase-realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - apikey
        - accept-profile
        - x-api-key
        - x-requested-with
        - Prefer
        - Range
        - x-client-info
        - x-supabase-api-version
        - x-supabase-client-info
        - x-customer-id
      exposed_headers:
        - Content-Range
        - X-Total-Count
      max_age: 3600
      credentials: true
