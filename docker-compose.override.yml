services:
  # --- STACK MONITORING (Custom) ---
  monitor:
    build:
      context: ./scripts
      dockerfile: Dockerfile.monitor
    container_name: stack_monitor
    restart: always
    env_file: .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - HOST_SERVER=${HOST_SERVER}
      - MONITOR_ENABLE_TELEGRAM_COMMANDS=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - trading_net
    security_opt:
      - no-new-privileges:true
