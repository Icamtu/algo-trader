name: Security Scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  bandit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Bandit Scan
        run: bandit -c .bandit -r . -ll -x ./scratch,./.agents,./.agents_backup,./openalgo-upstream,./host_venv,./node_modules,./venv -f txt

  pip-audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Pip-audit Scan
        run: |
          find . -name "requirements.txt" -not -path "*/.*" -not -path "./.agents*" -not -path "./host_venv/*" -not -path "./node_modules/*" -not -path "./venv/*" -exec pip-audit --ignore-vuln PYSEC-2020-25 -r {} +

  frontend-audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Bun Audit Scan
        run: |
          cd trading-ui && bun audit
