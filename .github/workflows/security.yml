name: Security Scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit Scan
        uses: shundor/python-bandit-scan@9ccf33ee8cd3766a6aae2ec8d8108cd36e3e57f2
        with:
          exit_code: true
          path: "."
          level: high

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pip-audit Scan
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: "."
          requirements: "requirements.txt"
